{% extends "app/base.html" %} {% block content %}

<div class="card card-profile my-5 mx-auto">
  <div class="card-body">
    <h5 class="card-title text-center">プロフィール</h5>
    <table class="profile_table mb-4">
      <tbody>
        <tr>
          <th class="header">名前</th>
          <td class="data">
            {{ user_data.first_name }} {{ user_data.last_name }}
          </td>
        </tr>
        <tr>
          <th class="header">メールアドレス</th>
          <td class="data">{{ user_data.email }}</td>
        </tr>
        <tr>
          <th class="header">住所</th>
          <td class="data">{{ user_data.address }}</td>
        </tr>
        <tr>
          <th class="header">電話番号</th>
          <td class="data">{{ user_data.tel }}</td>
        </tr>
        <tr>
          <th class="header">入会日</th>
          <td class="data">{{ user_data.created }}</td>
        </tr>
      </tbody>
    </table>
    <div class="button mx-auto">
      <a class="btn btn-lg btn-warning btn-block" href="{% url 'profile_edit' %}">編集する</a>
      <a class="btn btn-lg btn-secondary btn-block mt-2" href="{% url 'history' %}">購入履歴</a>
      <a class="btn btn-lg btn-primary btn-block mt-2" href="{% url 'user_reservations' %}">予約一覧</a>
      <a class="btn btn-lg btn-info btn-block mt-2" href="{% url 'seller_dashboard' %}">出品状況を確認</a>
    </div>
  </div>
</div>

{% endblock %}
