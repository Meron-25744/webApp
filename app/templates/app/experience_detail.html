{% extends "app/base.html" %}
{% load static %}

{% block content %}
<div class="container my-5">
  <div class="row">
    <div class="col-md-6">
      {% if experience.image %}
        <img src="{{ experience.image.url }}" class="img-fluid" alt="{{ experience.title }}">
      {% endif %}
    </div>
    <div class="col-md-6">
      <h2>{{ experience.title }}</h2>
      <p class="text-danger">{{ experience.price }} 円</p>
      <p>{{ experience.description }}</p>

      {% if user.is_authenticated %}
      <form method="post" action="{% url 'experience_reserve' experience.slug %}">
        {% csrf_token %}
        <div class="form-group">
          <label for="date">日付</label>
          <input type="date" name="date" id="date" class="form-control" required>
        </div>
        <div class="form-group mt-2">
          <label for="people">人数</label>
          <select name="people" id="people" class="form-control">
            {% for i in capacity_range %}
              <option value="{{ i }}">{{ i }}名</option>
            {% endfor %}
          </select>
        </div>
        <div class="mt-3">
          <button type="submit" class="btn btn-primary">予約する</button>
        </div>
      </form>
      {% else %}
      <p>予約にはログインが必要です。<a href="{% url 'account_login' %}?next={% url 'experience_detail' experience.slug %}">ログイン</a></p>
      {% endif %}
      
    </div>
  </div>
</div>
{% endblock %}
